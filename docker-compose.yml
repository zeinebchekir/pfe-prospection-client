services:
  db:
    image: postgres:15-alpine
    container_name: crmpfe_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crmpfe_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: crmpfe_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - crmpfe_network

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crmpfe_web
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - crmpfe_network

  frontend:
    image: node:20-alpine
    container_name: crmpfe_frontend
    working_dir: /app
    restart: unless-stopped
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_PROXY_TARGET: "http://web:8000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5174:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - web
    networks:
      - crmpfe_network

volumes:
  postgres_data:
  static_volume:

networks:
  crmpfe_network:
    driver: bridge
